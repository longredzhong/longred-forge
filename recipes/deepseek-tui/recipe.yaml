context:
  version: 0.8.60
package:
  name: deepseek-tui
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-linux-x64
