context:
  version: 0.8.67
package:
  name: deepseek-tui
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-linux-x64
    sha256: c65d3643a6b5ffe5c8f9875f1c30df8199765b64cb9daf66b8383d45d9fcab4b
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-tui-linux-x64
    sha256: 26451e04533f75e9e74ba974a62ee681b3d00377933947180e113274e197041b
- if: linux and aarch64
  then:
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-linux-arm64
    sha256: e9d7b17b20478f417b3e6a1a77414ab32c3c528e92b1c317e75d182de874b179
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-tui-linux-arm64
    sha256: f03aa74352bdef02b8803c06b97bbecd7a9b9ee673ec687cf7947ba05abd2902
- if: osx and x86_64
  then:
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-macos-x64
    sha256: 9a167f4275025f524bf0979f6e71a018d268288779e799508a98302327128fa3
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-tui-macos-x64
    sha256: 672a9ce1f9fa48924629b545d9745f55223e0095674dc63a8e57c15a0fc6c3e2
- if: osx and arm64
  then:
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-macos-arm64
    sha256: 2c3d74035ff533c8bf39b9126e254c14d4c90d2f4edec5f58586d3863fef57a7
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-tui-macos-arm64
    sha256: 885bccb86b52654958afdbeb50be4f41027e86095f743f862f232b6fbd10ed09
- if: win and x86_64
  then:
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-windows-x64.exe
    sha256: 02c3e2d9d56abaefb8d9dfce27c521dc454343731d9c5788f17c32bac45f2ea5
  - url: https://github.com/Hmbown/CodeWhale/releases/download/v${{ version }}/codewhale-tui-windows-x64.exe
    sha256: bc1261de76678fea2cd13d5ddc236d7e8cef3b7442da62dfff974bf40fe21caf
build:
  number: 0
  dynamic_linking:
    binary_relocation: false
    rpath_allowlist:
    - '**/*'
  script: 'python -c "exec( ''import os, shutil, stat, sys\n'' ''prefix = os.environ.get(\"PREFIX\")\n''
    ''if not prefix:\n'' ''    print(\"Error: PREFIX is not set\", file=sys.stderr)\n''
    ''    sys.exit(1)\n'' ''is_unix = sys.platform.startswith(\"linux\") or sys.platform
    == \"darwin\"\n'' ''bin_dir = os.path.join(prefix, \"bin\") if is_unix else os.path.join(prefix,
    \"Scripts\")\n'' ''os.makedirs(bin_dir, exist_ok=True)\n'' ''binaries = [\n''
    ''    (\"codewhale-linux-x64\", \"codewhale\"), (\"codewhale-linux-arm64\", \"codewhale\"),\n''
    ''    (\"codewhale-macos-x64\", \"codewhale\"), (\"codewhale-macos-arm64\", \"codewhale\"),\n''
    ''    (\"codewhale-windows-x64.exe\", \"codewhale.exe\"),\n'' ''    (\"codewhale-tui-linux-x64\",
    \"codewhale-tui\"),\n'' ''    (\"codewhale-tui-linux-arm64\", \"codewhale-tui\"),\n''
    ''    (\"codewhale-tui-macos-x64\", \"codewhale-tui\"),\n'' ''    (\"codewhale-tui-macos-arm64\",
    \"codewhale-tui\"),\n'' ''    (\"codewhale-tui-windows-x64.exe\", \"codewhale-tui.exe\"),\n''
    '']\n'' ''selected = [(src, dst) for src, dst in binaries if os.path.isfile(src)]\n''
    ''if len(selected) != 2:\n'' ''    print(f\"Error: expected exactly 2 binaries,
    found {len(selected)}\", file=sys.stderr)\n'' ''    sys.exit(1)\n'' ''for src,
    dst in selected:\n'' ''    dest = os.path.join(bin_dir, dst)\n'' ''    shutil.copy2(src,
    dest)\n'' ''    if is_unix:\n'' ''        os.chmod(dest, os.stat(dest).st_mode
    | stat.S_IEXEC | stat.S_IXUSR |\n'' ''                 stat.S_IXGRP | stat.S_IXOTH)\n''
    )"'
requirements:
  build: null
  run: null
tests:
- script:
  - codewhale --version
  - codewhale-tui --version
about:
  homepage: https://github.com/Hmbown/CodeWhale
  repository: https://github.com/Hmbown/CodeWhale
  license: MIT
  summary: CodeWhale - terminal coding agent (formerly DeepSeek-TUI)
  description: 'CodeWhale is a terminal coding agent (formerly DeepSeek-TUI). It provides
    the `codewhale` dispatcher command and the companion `codewhale-tui` runtime.

    '
extra:
  recipe-maintainers:
  - longredzhong
