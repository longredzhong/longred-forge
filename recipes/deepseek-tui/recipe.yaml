# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: 0.8.15
package:
  name: deepseek-tui
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-linux-x64
    sha256: 0ac43ff4685c1498428b820497b40be0f03bc927495d45a06df4507d4adbf8b4
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-tui-linux-x64
    sha256: b3dc48851a927f2d881759165ce3fe0fd8e652288ef09c4cacccc126c6598204
- if: linux and aarch64
  then:
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-linux-arm64
    sha256: 540d4ca2d61e9d8de1e4afb4d90bd2bcdfa89a99ae36e69b5439ff6513a73235
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-tui-linux-arm64
    sha256: 5010f5034777a5a83f52229b153fa8052d77e84e6c42320b47b1fc31aea6b242
- if: osx and x86_64
  then:
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-macos-x64
    sha256: 19d8d26f08aec64001023f0baeb01770cdf0d5a598b7968167ee1f77d4479ccc
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-tui-macos-x64
    sha256: 039a9990a020277624a827c8d6f33cf1bb377183c3195a1c667206b46f4c58c6
- if: osx and arm64
  then:
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-macos-arm64
    sha256: c560e17a54d12c20c703a0c301084c0d170684de0b87fcab2ceb5c2b57ad4ad2
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-tui-macos-arm64
    sha256: 1093bc3cefca6476bddbc34f8a418c8de60fc081dadeb9d6a675b4c754cf2d01
- if: win and x86_64
  then:
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-windows-x64.exe
    sha256: 11e2446869ec77d41746a15d8cd87412bca9cd980c9871b481e0e36334ad37a5
  - url: https://github.com/Hmbown/DeepSeek-TUI/releases/download/v${{ version }}/deepseek-tui-windows-x64.exe
    sha256: ba032059a811db63cb466ee25596e6cb6945fae4ad6d9b9f948e726d5703ba1d
build:
  number: 0
  dynamic_linking:
    binary_relocation: false
    rpath_allowlist:
    - '**/*'
  script: >-
    python -c "import os, shutil, stat, sys;
    prefix = os.environ.get('PREFIX');
    [exit(1) if not prefix else None];
    is_unix = sys.platform.startswith('linux') or sys.platform == 'darwin';
    bin_dir = os.path.join(prefix, 'bin') if is_unix else os.path.join(prefix, 'Scripts');
    os.makedirs(bin_dir, exist_ok=True);
    binaries = [
    ('deepseek-linux-x64', 'deepseek'), ('deepseek-linux-arm64', 'deepseek'),
    ('deepseek-macos-x64', 'deepseek'), ('deepseek-macos-arm64', 'deepseek'),
    ('deepseek-windows-x64.exe', 'deepseek.exe'),
    ('deepseek-tui-linux-x64', 'deepseek-tui'), ('deepseek-tui-linux-arm64', 'deepseek-tui'),
    ('deepseek-tui-macos-x64', 'deepseek-tui'), ('deepseek-tui-macos-arm64', 'deepseek-tui'),
    ('deepseek-tui-windows-x64.exe', 'deepseek-tui.exe')];
    selected = [(src, dst) for src, dst in binaries if os.path.isfile(src)];
    [exit(1) if len(selected) != 2 else None];
    [shutil.copy2(src, os.path.join(bin_dir, dst)) for src, dst in selected];
    [os.chmod(os.path.join(bin_dir, dst), os.stat(os.path.join(bin_dir, dst)).st_mode |
    stat.S_IEXEC | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH) for src, dst in selected if is_unix]"
requirements:
  build: null
  run: null
tests:
- script:
  - deepseek --version
  - deepseek-tui --version
about:
  homepage: https://github.com/Hmbown/DeepSeek-TUI
  repository: https://github.com/Hmbown/DeepSeek-TUI
  license: MIT
  summary: DeepSeek TUI - terminal coding agent for DeepSeek
  description: 'DeepSeek TUI is a terminal coding agent for DeepSeek V4. It provides
    the `deepseek` dispatcher command and the companion `deepseek-tui` runtime.

    '
extra:
  recipe-maintainers:
  - longredzhong
