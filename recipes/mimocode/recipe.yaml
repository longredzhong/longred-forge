# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: 0.1.4
package:
  name: mimocode
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-linux-x64.tar.gz
    sha256: 9868b738093843bca467209bec4efd7f36ecbea08e81aa1006e8438bd7d52b41
- if: linux and aarch64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-linux-arm64.tar.gz
    sha256: 248be7f38aa24b3f69e12b116dd2f2c58d8d0d227bf3381b93725397c0789db8
- if: osx and x86_64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-darwin-x64.zip
    sha256: 94b39febac350386082d3d479a74e87621da35cb93f126b395fe1c56a8d6e978
- if: osx and arm64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-darwin-arm64.zip
    sha256: 69cb4db4c3ca15d441aab5f73646319d90319296da86bffe0d6b74ca590b1a2c
- if: win and x86_64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-windows-x64.zip
    sha256: 6df50f071dac5fcc9d7b9c98924d68437619802d9c72e0a74bada62fb1f617cb
build:
  number: 0
  dynamic_linking:
    binary_relocation: false
    rpath_allowlist:
    - '**/*'
  script: 'python -c "import os, shutil, stat, sys; prefix = os.environ.get(''PREFIX'');
    [exit(1) if not prefix else None]; bin_dir = os.path.join(prefix, ''bin'') if
    (sys.platform.startswith(''linux'') or sys.platform == ''darwin'') else os.path.join(prefix,
    ''Scripts''); binary_name = ''mimo'' if (sys.platform.startswith(''linux'') or
    sys.platform == ''darwin'') else ''mimo.exe''; os.makedirs(bin_dir, exist_ok=True);
    source_patterns = [binary_name, f''./{binary_name}'', os.path.join(''.'', binary_name)];
    source_file = next((p for p in source_patterns if os.path.isfile(p)), None); [exit(1)
    if not source_file else None]; dest_file = os.path.join(bin_dir, binary_name);
    shutil.copy2(source_file, dest_file); (lambda: os.chmod(dest_file, os.stat(dest_file).st_mode
    | stat.S_IEXEC | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH) if (sys.platform.startswith(''linux'')
    or sys.platform == ''darwin'') else None)()"

    '
requirements:
  build: null
  run: null
tests:
- script:
  - mimo --version
about:
  homepage: https://github.com/XiaomiMiMo/MiMo-Code
  repository: https://github.com/XiaomiMiMo/MiMo-Code
  license: MIT
  summary: MiMo-Code - AI coding agent for your terminal
  description: 'MiMo-Code is an AI-powered coding agent that helps you write, review,
    and refactor code directly from your terminal. It provides intelligent code assistance
    using advanced AI models.

    '
extra:
  recipe-maintainers:
  - longredzhong
