# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: 0.1.0
package:
  name: mimocode
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-linux-x64.tar.gz
    sha256: e0ee0d032b9dd1350193fe6f3eb0ba288fd0a641e29dc651cd7e3df5ac6f29ad
- if: linux and aarch64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-linux-arm64.tar.gz
    sha256: 12a3c50ff5789ad5dcf54fd216353012467a66b3d27b015968a6e4ea88347ab1
- if: osx and x86_64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-darwin-x64.zip
    sha256: e5d416fd215374d1c701fd947fbf54477e56d37f09108391f5bfef0976931471
- if: osx and arm64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-darwin-arm64.zip
    sha256: e9902eaac38e67a0e4b31f1a5fe122a5bd5d37c7824aa04b18e3e185b49ef194
- if: win and x86_64
  then:
  - url: https://github.com/XiaomiMiMo/MiMo-Code/releases/download/v${{ version }}/mimocode-windows-x64.zip
    sha256: 78294af0fe17b2375f20352b3eddf045779a2bb507072c3c7bf1b676283ccf15
build:
  number: 0
  dynamic_linking:
    binary_relocation: false
    rpath_allowlist:
    - '**/*'
  script: 'python -c "import os, shutil, stat, sys; prefix = os.environ.get(''PREFIX''); [exit(1) if not prefix else None]; bin_dir = os.path.join(prefix, ''bin'') if (sys.platform.startswith(''linux'') or sys.platform == ''darwin'') else os.path.join(prefix, ''Scripts''); binary_name = ''mimo'' if (sys.platform.startswith(''linux'') or sys.platform == ''darwin'') else ''mimo.exe''; os.makedirs(bin_dir, exist_ok=True); source_patterns = [binary_name, f''./{binary_name}'', os.path.join(''.'', binary_name)]; source_file = next((p for p in source_patterns if os.path.isfile(p)), None); [exit(1) if not source_file else None]; dest_file = os.path.join(bin_dir, binary_name); shutil.copy2(source_file, dest_file); (lambda: os.chmod(dest_file, os.stat(dest_file).st_mode | stat.S_IEXEC | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH) if (sys.platform.startswith(''linux'') or sys.platform == ''darwin'') else None)()"

    '
requirements:
  build: null
  run: null
tests:
- script:
  - mimo --version
about:
  homepage: https://github.com/XiaomiMiMo/MiMo-Code
  repository: https://github.com/XiaomiMiMo/MiMo-Code
  license: MIT
  summary: MiMo-Code - AI coding agent for your terminal
  description: >
    MiMo-Code is an AI-powered coding agent that helps you write, review, and refactor code directly from your terminal. It provides intelligent code assistance using advanced AI models.
extra:
  recipe-maintainers:
  - longredzhong
