# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: 0.1.9
package:
  name: obscura
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-x86_64-linux.tar.gz
    sha256: 8158f7f630760a629062ec87239e6f65c13bf3897bd732da64e8ac075ab4101f
- if: linux and aarch64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-aarch64-linux.tar.gz
    sha256: 10d99b1bbfd5756fe5b8e67775ce88e495b6a81e38c5bdb2faa449f9ab559813
- if: osx and x86_64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-x86_64-macos.tar.gz
    sha256: 16163ad8a1635f8f551d4643bf1ad5948bb1af2f4d7ae4b049f387e028114751
- if: osx and arm64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-aarch64-macos.tar.gz
    sha256: e470007e7d0be4f96f15ba00b21ea0e90dd26df03b3bea4bb547f406072fef5e
- if: win and x86_64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-x86_64-windows.zip
    sha256: 985704ce025b04c6d9aa42c6628512dd7bb923f6cadca8aa894cb339313e2478
build:
  number: 0
  dynamic_linking:
    binary_relocation: false
    rpath_allowlist:
    - '**/*'
  script: 'python -c "import os, shutil, stat, sys; prefix = os.environ.get(''PREFIX''); [exit(1) if not prefix else None]; bin_dir = os.path.join(prefix, ''bin'') if (sys.platform.startswith(''linux'') or sys.platform == ''darwin'') else os.path.join(prefix, ''Scripts''); is_unix = sys.platform.startswith(''linux'') or sys.platform == ''darwin''; binaries = [''obscura'', ''obscura-worker''] if is_unix else [''obscura.exe'', ''obscura-worker.exe'']; os.makedirs(bin_dir, exist_ok=True); [shutil.copy2(next(p for p in [b, f''./{b}'', os.path.join(''.'', b)] if os.path.isfile(p)), os.path.join(bin_dir, b)) or (os.chmod(os.path.join(bin_dir, b), os.stat(os.path.join(bin_dir, b)).st_mode | stat.S_IEXEC | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH) if is_unix else None) for b in binaries]"

    '
requirements:
  build: null
  run: null
tests:
- script:
  - obscura --version
about:
  homepage: https://github.com/h4ckf0r0day/obscura
  repository: https://github.com/h4ckf0r0day/obscura
  documentation: https://docs.obscura.sh
  license: MIT
  summary: Obscura - A lightweight headless browser for web scraping and automation
  description: 'Obscura is a single-developer, open-source Rust headless browser. It boots instantly, has a ~70 MB binary, ~30 MB RAM at runtime, and serves a Chrome DevTools Protocol port that Puppeteer and Playwright connect to unchanged. You swap the binary, not the code.

    '
