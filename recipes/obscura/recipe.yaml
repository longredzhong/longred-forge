# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: 0.1.10
package:
  name: obscura
  version: ${{ version }}
source:
- if: linux and x86_64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-x86_64-linux.tar.gz
    sha256: 7efd9d53546b69ed6cc84a47d5c08ee7a7041ee87ab95e7310fda708608a5093
- if: linux and aarch64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-aarch64-linux.tar.gz
    sha256: a50c154970934af3cf9fd2bec6c8a53ff76f25b0c4d9e78c286ce4bc3bca0adf
- if: osx and x86_64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-x86_64-macos.tar.gz
    sha256: cfd74f777be7dccebe0ed1fc4b264f8c4dfb0e52cf929d88acde85365c4e2961
- if: osx and arm64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-aarch64-macos.tar.gz
    sha256: a4a868cedf2fb95f2b3af2dc9dacf235eef08398f070387b9a02e65faf1f93e3
- if: win and x86_64
  then:
  - url: https://github.com/h4ckf0r0day/obscura/releases/download/v${{ version }}/obscura-x86_64-windows.zip
    sha256: 238eebe25f5793ff41898e1cf52dc11e8a637c0d799c69aaffe7904cbbb5a858
build:
  number: 0
  dynamic_linking:
    binary_relocation: false
    rpath_allowlist:
    - '**/*'
  script: 'python -c "import os, shutil, stat, sys; prefix = os.environ.get(''PREFIX'');
    [exit(1) if not prefix else None]; bin_dir = os.path.join(prefix, ''bin'') if
    (sys.platform.startswith(''linux'') or sys.platform == ''darwin'') else os.path.join(prefix,
    ''Scripts''); is_unix = sys.platform.startswith(''linux'') or sys.platform ==
    ''darwin''; binaries = [''obscura'', ''obscura-worker''] if is_unix else [''obscura.exe'',
    ''obscura-worker.exe'']; os.makedirs(bin_dir, exist_ok=True); [shutil.copy2(next(p
    for p in [b, f''./{b}'', os.path.join(''.'', b)] if os.path.isfile(p)), os.path.join(bin_dir,
    b)) or (os.chmod(os.path.join(bin_dir, b), os.stat(os.path.join(bin_dir, b)).st_mode
    | stat.S_IEXEC | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH) if is_unix else None)
    for b in binaries]"

    '
requirements:
  build: null
  run: null
tests:
- script:
  - obscura --version
about:
  homepage: https://github.com/h4ckf0r0day/obscura
  repository: https://github.com/h4ckf0r0day/obscura
  documentation: https://docs.obscura.sh
  license: MIT
  summary: Obscura - A lightweight headless browser for web scraping and automation
  description: 'Obscura is a single-developer, open-source Rust headless browser.
    It boots instantly, has a ~70 MB binary, ~30 MB RAM at runtime, and serves a Chrome
    DevTools Protocol port that Puppeteer and Playwright connect to unchanged. You
    swap the binary, not the code.

    '
